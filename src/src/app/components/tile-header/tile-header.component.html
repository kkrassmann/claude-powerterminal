<div class="tile-header" (click)="onHeaderClick()" (dblclick)="onHeaderDblClick()">
  <!-- Line 1: Working directory + action buttons -->
  <div class="header-line-1">
    <span class="status-dot" [style.backgroundColor]="statusColor" [title]="statusLabel"></span>
    <span class="working-dir" [title]="session.metadata.workingDirectory">{{ shortenedPath }}</span>
    <div class="header-actions">
      <button class="header-btn" (click)="onRestart()" title="Neu starten">&#x21BB;</button>
      <button class="header-btn danger" (click)="onKill()" title="Session beenden">&#x2715;</button>
      <button class="header-btn" (click)="onMaximize()" [title]="isMaximized ? 'Wiederherstellen' : 'Maximieren'">
        {{ isMaximized ? '&#x29C9;' : '&#x25A1;' }}
      </button>
    </div>
  </div>

  <!-- Line 2: Git branch + change counts (only if git repo) -->
  <div class="header-line-2" *ngIf="gitContext?.isGitRepo">
    <span class="git-branch">
      <span class="git-icon">&#x2387;</span>
      <span class="git-branch-name">{{ gitContext?.branch || 'unknown' }}</span>
    </span>
    <span class="git-changes" [class.highlight]="isChanged">
      <span class="git-added">+{{ gitContext?.added }}</span>
      <span class="git-modified">~{{ gitContext?.modified }}</span>
      <span class="git-deleted">-{{ gitContext?.deleted }}</span>
    </span>
    <!-- Practice score + badges inline with git info -->
    <span class="practice-score score-chip" *ngIf="practiceScore !== null" [style.color]="scoreColor" (click)="onScoreClick(); $event.stopPropagation()">{{ practiceScore }}</span>
    <span class="badge" *ngFor="let badge of badges" [class.achievement-badge]="isAchievementBadge(badge)">{{ getBadgeEmoji(badge) }} {{ badge }}</span>
  </div>

  <!-- Line 2 fallback: show score + badges even without git context -->
  <div class="header-line-2" *ngIf="!gitContext?.isGitRepo && (practiceScore !== null || badges.length > 0)">
    <span class="practice-score score-chip" *ngIf="practiceScore !== null" [style.color]="scoreColor" (click)="onScoreClick(); $event.stopPropagation()">{{ practiceScore }}</span>
    <span class="badge" *ngFor="let badge of badges" [class.achievement-badge]="isAchievementBadge(badge)">{{ getBadgeEmoji(badge) }} {{ badge }}</span>
  </div>
</div>
