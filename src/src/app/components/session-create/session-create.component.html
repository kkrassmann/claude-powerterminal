<button class="open-dialog-btn" (click)="isDialogOpen = true">+ New Session</button>

<div class="dialog-overlay" *ngIf="isDialogOpen" (click)="isDialogOpen = false">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>New Claude Session</h2>
      <button class="close-btn" (click)="isDialogOpen = false">&times;</button>
    </div>

    <form (ngSubmit)="createSession()" #sessionForm="ngForm">
      <div class="form-section">
        <label for="directory-select">Working Directory</label>
        <div class="directory-input-group">
          <select
            id="directory-select"
            (change)="onDirectorySelect($any($event.target).value)"
            class="form-control"
          >
            <option value="">-- Recent directories --</option>
            <option *ngFor="let dir of recentDirectories" [value]="dir">{{ dir }}</option>
          </select>
          <input
            type="text"
            id="directory-input"
            name="workingDirectory"
            [(ngModel)]="workingDirectory"
            placeholder="C:\Users\username\projects\my-app"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="form-section">
        <label for="session-id-input">Session ID (optional)</label>
        <input
          type="text"
          id="session-id-input"
          name="sessionId"
          [(ngModel)]="sessionId"
          placeholder="Leave empty for auto-generated ID"
          class="form-control"
        />
      </div>

      <div class="form-section">
        <label>CLI Flags</label>
        <div class="flags-checkboxes">
          <div class="flag-checkbox" *ngFor="let flag of objectKeys(selectedFlags)">
            <input type="checkbox" [id]="'flag-' + flag" [(ngModel)]="selectedFlags[flag]" [name]="'flag-' + flag" />
            <label [for]="'flag-' + flag">{{ flag }}</label>
          </div>
        </div>
        <input
          type="text"
          name="customFlags"
          [(ngModel)]="customFlags"
          placeholder="e.g. --timeout 60 --model opus"
          class="form-control"
        />
      </div>

      <div *ngIf="statusMessage" class="status-message" [class.error]="statusType === 'error'">
        {{ statusMessage }}
      </div>

      <div class="dialog-actions">
        <button type="button" class="cancel-btn" (click)="isDialogOpen = false">Cancel</button>
        <button type="submit" class="create-btn" [disabled]="isCreating || !workingDirectory">
          {{ isCreating ? 'Creating...' : 'Start Session' }}
        </button>
      </div>
    </form>
  </div>
</div>
