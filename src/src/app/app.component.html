<div class="app-container">
  <header class="app-header">
    <h1>Claude PowerTerminal</h1>
    <button class="mute-btn" (click)="audioAlertService.toggleMute()" [title]="audioAlertService.isMuted ? 'Ton aktivieren' : 'Ton deaktivieren'">
      {{ audioAlertService.isMuted ? '🔇' : '🔊' }}
    </button>
    <button class="analysis-btn" (click)="showAnalysis = !showAnalysis" [class.active]="showAnalysis" title="Analyse-Panel umschalten">
      Analyse
    </button>
    <span class="lan-url" *ngIf="lanUrl">{{ lanUrl }}</span>
    <app-session-create></app-session-create>
  </header>

  <app-analysis-panel *ngIf="showAnalysis"></app-analysis-panel>

  <app-dashboard
    [pendingSessions]="pendingSessions"
    (sessionExited)="onSessionExited($event)"
    (sessionSelected)="onSessionSelected($event)">
  </app-dashboard>

  <app-session-detail
    *ngIf="selectedSessionId"
    [sessionId]="selectedSessionId"
    (close)="closeSessionDetail()">
  </app-session-detail>
</div>
