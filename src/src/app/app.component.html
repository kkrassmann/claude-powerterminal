<div class="app-container">
  <header class="app-header">
    <h1>Claude PowerTerminal</h1>
    <button class="mute-btn" (click)="audioAlertService.toggleMute()" [title]="audioAlertService.isMuted ? 'Unmute' : 'Mute'">
      {{ audioAlertService.isMuted ? '🔇' : '🔊' }}
    </button>
    <button class="refresh-btn" (click)="refreshApp()" title="Reload app">🔄</button>
    <button class="logs-btn" (click)="exportLogs()" title="Download internal logs">📋</button>
    <button class="analysis-btn" (click)="showAnalysis = !showAnalysis" [class.active]="showAnalysis" title="Toggle analysis panel">
      Analysis
    </button>
    <span class="lan-url" *ngIf="lanUrl">{{ lanUrl }}</span>
    <app-session-create></app-session-create>
  </header>

  <app-analysis-panel *ngIf="showAnalysis" [sessionPaths]="activeSessionPaths"></app-analysis-panel>

  <app-dashboard
    [pendingSessions]="pendingSessions"
    (sessionExited)="onSessionExited($event)"
    (sessionSelected)="onSessionSelected($event)">
  </app-dashboard>

  <app-session-detail
    *ngIf="selectedSessionId"
    [sessionId]="selectedSessionId"
    (close)="closeSessionDetail()">
  </app-session-detail>
</div>
